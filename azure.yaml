# Azure Developer CLI 設定
# azd up で全リソースのプロビジョニング＋デプロイが実行されます

name: foundry-mcp-poc
metadata:
  template: foundry-mcp-poc@0.1.0

# インフラ設定
infra:
  provider: bicep
  path: infra
  module: main

# サービス設定
services:
  mcp-server:
    project: src/mcp-server
    language: py
    host: containerapp
    docker:
      path: Dockerfile
      context: .
    env:
      # MCP サーバの環境変数は Container Apps 側で注入されるため
      # ここでは azd 固有の変数のみ定義

# フック - デプロイ前後のカスタム処理
hooks:
  postprovision:
    shell: pwsh
    run: |
      # DB スキーマ・サンプルデータ適用 (初回のみ)
      Write-Host "Applying database schema..."
      # アーキテクチャ上 Private Endpoint 経由のためローカルから直接実行不可
      # Jump Box または GitHub Actions (Self-hosted Runner) から実行してください:
      #   sqlcmd -S $env:SQL_SERVER_FQDN -d $env:SQL_DB_NAME \
      #          --authentication-method=ActiveDirectoryIntegrated \
      #          -i database/schema.sql
      Write-Host "SKIP: DB schema must be applied via Jump Box or CI/CD pipeline (see docs/03_deployment_guide.md Step 4)"

      # メタデータ (AI Search インデックス) 作成
      Write-Host "Uploading metadata to AI Search..."
      # Private Endpoint 経由のためローカルから直接実行不可
      # Jump Box または Private Link 経由でアクセス可能な環境から以下を実行:
      #   python database/metadata/upload_metadata.py \
      #     --endpoint $env:AZURE_AI_SEARCH_ENDPOINT \
      #     --index-name metadata-index \
      #     --dict-path database/metadata/data_dictionary.json
      Write-Host "SKIP: Metadata upload must be done after network access is confirmed (see docs/03_deployment_guide.md Step 6)"
    continueOnError: true

  predeploy:
    shell: pwsh
    run: |
      Write-Host "Pre-deploy checks..."
      # Docker イメージのビルド確認
      docker build -t mcp-server-test src/mcp-server
      docker rmi mcp-server-test
    continueOnError: false

  postdeploy:
    shell: pwsh
    run: |
      Write-Host "Running smoke tests..."
      $rg = $env:AZURE_RESOURCE_GROUP
      $envName = $env:AZURE_ENV_NAME
      if ([string]::IsNullOrEmpty($rg)) {
        Write-Host "AZURE_RESOURCE_GROUP is not set; skipping smoke test"
        exit 0
      }
      if ([string]::IsNullOrEmpty($envName)) {
        $envName = 'dev'
      }
      ./scripts/smoke_test.ps1 -ResourceGroupName $rg -EnvironmentName $envName
    continueOnError: true

